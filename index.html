<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ChopShops</title>
  <!-- Tailwind (CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Card skeleton shimmer */
    .shimmer {
      background: linear-gradient(90deg, rgba(255,255,255,0.06) 25%, rgba(255,255,255,0.14) 37%, rgba(255,255,255,0.06) 63%);
      background-size: 400% 100%;
      animation: shimmer 1.2s ease-in-out infinite;
    }
    @keyframes shimmer { 0%{background-position:100% 0} 100%{background-position:0 0} }
    /* Clamp text lines */
    .line-clamp-2 { display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  </style>
</head>
<body class="bg-neutral-950 text-neutral-100">
  <!-- Header -->
<header class="sticky top-0 z-50 border-b border-neutral-800 bg-black/95 backdrop-blur">
  <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
    <div class="flex h-16 items-center justify-between">
      <!-- LOGO + HOME LINK -->
      <a href="/" class="flex items-center gap-2 group" aria-label="Go to homepage">
        <img 
          src="assets/logo.png" 
          alt="ChopShops logo"
          class="h-9 w-auto max-w-[160px] object-contain transition-transform duration-200 group-hover:scale-105"
          style="max-height: 40px;" 
        />
      </a>

      <!-- MENU DROPDOWN -->
      <div class="relative">
        <button id="menuBtn" 
                class="inline-flex items-center gap-2 rounded-lg border border-neutral-800 bg-neutral-900 px-3 py-1.5 text-sm hover:bg-neutral-800">
          MENU
          <svg xmlns="http://www.w3.org/2000/svg" 
               class="h-4 w-4" viewBox="0 0 24 24" fill="currentColor">
            <path d="M7 10l5 5 5-5H7z"/>
          </svg>
        </button>
        <div id="menuDrop" 
             class="absolute right-0 mt-2 hidden w-48 overflow-hidden rounded-lg border border-neutral-800 bg-neutral-900 shadow-xl">
          <!-- Dynamic categories load here -->
        </div>
      </div>
    </div>
  </div>
</header>
        <!-- Menu -->
        <div class="relative">
          <button id="menuBtn" class="inline-flex items-center gap-2 rounded-lg border border-neutral-800 bg-neutral-900 px-3 py-1.5 text-sm hover:bg-neutral-800">
            MENU
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="currentColor"><path d="M7 10l5 5 5-5H7z"/></svg>
          </button>
          <div id="menuDrop" class="absolute right-0 mt-2 hidden w-48 overflow-hidden rounded-lg border border-neutral-800 bg-neutral-900 shadow-xl">
            <a href="#latest" class="block px-3 py-2 text-sm hover:bg-neutral-800">Latest</a>
            <a href="#approved" class="block px-3 py-2 text-sm hover:bg-neutral-800">Approved</a>
            <a href="#ideas" class="block px-3 py-2 text-sm hover:bg-neutral-800">Ideas</a>
            <a href="#about" class="block px-3 py-2 text-sm hover:bg-neutral-800">About</a>
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- Page -->
  <main class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8 py-8">
    <section id="latest" class="space-y-6">
      <h2 class="text-2xl font-bold tracking-tight">Latest finds</h2>

      <!-- Filters (optional, shows when categories found) -->
      <div id="filters" class="hidden flex-wrap gap-2"></div>

      <!-- Grid -->
      <div id="grid" class="grid grid-cols-1 gap-5 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4">
        <!-- skeletons -->
        <div class="rounded-xl border border-neutral-800 bg-neutral-900 p-4">
          <div class="aspect-[4/3] shimmer rounded-lg mb-3"></div>
          <div class="h-4 w-2/3 shimmer rounded mb-2"></div>
          <div class="h-3 w-1/2 shimmer rounded"></div>
        </div>
        <div class="rounded-xl border border-neutral-800 bg-neutral-900 p-4">
          <div class="aspect-[4/3] shimmer rounded-lg mb-3"></div>
          <div class="h-4 w-2/3 shimmer rounded mb-2"></div>
          <div class="h-3 w-1/2 shimmer rounded"></div>
        </div>
        <div class="rounded-xl border border-neutral-800 bg-neutral-900 p-4">
          <div class="aspect-[4/3] shimmer rounded-lg mb-3"></div>
          <div class="h-4 w-2/3 shimmer rounded mb-2"></div>
          <div class="h-3 w-1/2 shimmer rounded"></div>
        </div>
      </div>

      <!-- Empty state -->
      <div id="empty" class="hidden text-neutral-400">No products yet. Mark items as <span class="font-semibold text-neutral-200">Approved</span> in Notion.</div>
    </section>
  </main>

  <footer id="about" class="mx-auto mt-12 max-w-7xl px-4 sm:px-6 lg:px-8 pb-12 text-sm text-neutral-400">
    <p>© <span id="year"></span> ChopShops • curated finds</p>
  </footer>

<script>
// ===== MENU SETUP =====
const btn = document.getElementById('menuBtn');
const drop = document.getElementById('menuDrop');

btn.addEventListener('click', () => drop.classList.toggle('hidden'));
document.addEventListener('click', (e) => {
  if (!btn.contains(e.target) && !drop.contains(e.target)) drop.classList.add('hidden');
});

document.getElementById('year').textContent = new Date().getFullYear();

// ===== FETCH PRODUCTS (Cloudflare only) =====
async function fetchProducts() {
  // Try both likely Cloudflare worker routes
  const endpoints = ['/fetchProducts', '/api/fetchProducts'];
  for (const url of endpoints) {
    try {
      const res = await fetch(url, { headers: { 'cache-control': 'no-cache' } });
      if (res.ok) return res.json();
    } catch (err) {
      console.warn(`Fetch failed for ${url}`, err);
    }
  }
  return { items: [] };
}

// ===== HELPERS =====
function fmtPrice(value) {
  const n = Number(value);
  return isFinite(n) ? `$${n.toFixed(2)}` : value || '';
}

function card(p) {
  const img = p.image || '';
  const title = p.title || 'Untitled';
  const why = p.why || '';
  const price = p.price ? fmtPrice(p.price) : '';
  const url = p.url || '#';
  const cat = p.category || '';
  const hook = p.hook || '';

  return `
    <article class="group rounded-xl border border-neutral-800 bg-neutral-900 overflow-hidden hover:border-neutral-700 transition" data-cat="${cat}">
      <a href="${url}" target="_blank" rel="noopener" class="block">
        <div class="aspect-[4/3] bg-neutral-800 overflow-hidden">
          ${img ? `<img src="${img}" alt="" class="h-full w-full object-cover group-hover:opacity-95">`
                 : `<div class="h-full w-full grid place-items-center text-neutral-600">No Image</div>`}
        </div>
      </a>
      <div class="p-4 space-y-2">
        <div class="flex items-center justify-between">
          <h3 class="font-semibold leading-tight line-clamp-2">${title}</h3>
          ${price ? `<span class="ml-3 rounded-md bg-neutral-800 px-2 py-0.5 text-xs">${price}</span>` : ``}
        </div>
        ${hook ? `<p class="text-sm text-neutral-300 line-clamp-2">${hook}</p>` : ``}
        ${why ? `<p class="text-sm text-neutral-400 line-clamp-2">${why}</p>` : ``}
        <div class="flex items-center justify-between pt-1">
          ${cat ? `<span class="text-xs text-neutral-400">${cat}</span>` : ``}
          <a href="${url}" target="_blank" rel="noopener" class="text-xs text-blue-400 hover:underline">Buy →</a>
        </div>
      </div>
    </article>`;
}

// ===== MAIN =====
(async () => {
  const grid = document.getElementById('grid');
  const { items = [] } = await fetchProducts();

  if (!items.length) {
    grid.innerHTML = '<p class="text-neutral-500">No products yet. Check your Notion integration.</p>';
    return;
  }

  // Build product cards
  grid.innerHTML = items.map(card).join('');

  // Build dynamic menu from unique categories
  const cats = [...new Set(items.map(i => i.category).filter(Boolean))];
  const menuHTML = cats.map(c => 
    `<a href="#" data-cat="${c}" class="block px-3 py-2 text-sm hover:bg-neutral-800">${c}</a>`
  ).join('') + `
    <a href="#about" class="block px-3 py-2 text-sm hover:bg-neutral-800 border-t border-neutral-800">About</a>`;

  drop.innerHTML = menuHTML;

  // Filter cards by category
  drop.addEventListener('click', (e) => {
    const link = e.target.closest('a[data-cat]');
    if (!link) return;
    e.preventDefault();
    const cat = link.dataset.cat;
    document.querySelectorAll('#grid article').forEach(card => {
      card.style.display = (card.dataset.cat === cat || !cat) ? '' : 'none';
    });
    drop.classList.add('hidden');
  });
})();
</script></body>
</html>
