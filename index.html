<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chop Shops</title>

<style>

:root{

  --green:#62b33f;

  --dark:#050505;

  --light:#f6f6f2;

  --border:#e3e3e3;

}

*{margin:0;padding:0;box-sizing:border-box;}

body{

  font-family:Arial, sans-serif;

  background:var(--light);

}

/* HEADER */

.header{

  background:#000;

  color:white;

  height:70px;

  display:flex;

  align-items:center;

  justify-content:space-between;

  padding:0 6%;

}

.logo img{

  height:42px;

}

/* NAV */

.nav{

  display:flex;

  gap:25px;

  font-weight:900;

  text-transform:uppercase;

}

.search{

  background:#111;

  border:1px solid #333;

  padding:10px;

  border-radius:6px;

  color:white;

}

/* HERO */

.hero{

  background:

    linear-gradient(90deg,rgba(0,0,0,.95),rgba(0,0,0,.5)),

    url("https://images.unsplash.com/photo-1556911220-bff31c812dba");

  background-size:cover;

  color:white;

  padding:80px 6%;

}

.hero h1{

  font-size:56px;

}

.hero span{color:var(--green);}

.btn{

  display:inline-block;

  margin-top:20px;

  padding:14px 22px;

  border-radius:6px;

  font-weight:900;

}

.green{background:var(--green);color:white;}

.outline{border:2px solid white;color:white;}

/* TRUST STRIP */

.trust-strip{

  background:#000;

  color:white;

  display:grid;

  grid-template-columns:repeat(4,1fr);

  padding:20px 6%;

}

.trust-item{

  display:flex;

  align-items:center;

  gap:12px;

}

/* PREMIUM ICONS */

.icon{

  width:34px;

  height:34px;

  stroke:var(--green);

  fill:none;

  stroke-width:2;

}

/* DEALS */

.section{padding:40px 6%;}

.grid{

  display:grid;

  grid-template-columns:repeat(5,1fr);

  gap:16px;

}

.card{

  background:white;

  border:1px solid var(--border);

  border-radius:10px;

  overflow:hidden;

}

.card img{

  width:100%;

  height:180px;

  object-fit:cover;

}

.card-body{padding:14px;}

.price{

  font-weight:900;

  font-size:20px;

}

.savings{

  background:#eef8e9;

  padding:8px;

  border-radius:6px;

  margin-top:8px;

}

.savings strong{color:var(--green);}

.small-btn{

  display:block;

  margin-top:6px;

  padding:10px;

  text-align:center;

  border-radius:6px;

  font-weight:900;

  border:1px solid #ccc;

}

.small-btn.green{

  background:var(--green);

  color:white;

}

/* MOBILE */

@media(max-width:900px){

  .nav{display:none;}

  .grid{grid-template-columns:1fr;}

}

</style>

</head>

<body>

<header class="header">

  <div class="logo">

    <img src="assets/logo.PNG">

  </div>

  <nav class="nav">

    <a>Deals</a>

    <a>Categories</a>

    <a>How It Works</a>

  </nav>

  <input class="search" placeholder="Search...">

</header>

<section class="hero">

  <h1>STOP OVERPAYING FOR <span>EVERYDAY STUFF</span></h1>

  <a class="btn green">SHOP DEALS</a>

  <a class="btn outline">HOW IT SAVES YOU</a>

</section>

<!-- TRUST STRIP -->

<section class="trust-strip">

<div class="trust-item">

<svg class="icon" viewBox="0 0 24 24">

<rect x="3" y="6" width="18" height="14" rx="2"/>

</svg>

Handpicked

</div>

<div class="trust-item">

<svg class="icon" viewBox="0 0 24 24">

<circle cx="12" cy="12" r="9"/>

<path d="M12 7v10"/>

</svg>

Savings

</div>

<div class="trust-item">

<svg class="icon" viewBox="0 0 24 24">

<path d="M7 7h13"/>

<path d="M17 4l3 3-3 3"/>

</svg>

Replaces

</div>

<div class="trust-item">

<svg class="icon" viewBox="0 0 24 24">

<path d="M12 3l7 3v5c0 5-3 8-7 10"/>

</svg>

Trusted

</div>

</section>

<section class="section">

<h2>FEATURED DEALS</h2>

<br>

<div class="grid" id="grid"></div>

</section>

<script>

const products = [

{

name:"Water Filter Pitcher",

price:"$29.99",

savings:"$180–$600/year",

replaces:"Bottled water",

img:"https://images.unsplash.com/photo-1622484212850-eb596d769edc"

},

{

name:"Reusable Paper Towels",

price:"$19.99",

savings:"$100–$250/year",

replaces:"Paper towels",

img:"https://images.unsplash.com/photo-1600857544200-b2f666a9a2ec"

}

];

const grid = document.getElementById("grid");

grid.innerHTML = products.map(p => `

<div class="card">

<img src="${p.img}">

<div class="card-body">

<h3>${p.name}</h3>

<div class="price">${p.price}</div>

<div class="savings">

<strong>Annual Savings:</strong> ${p.savings}

</div>

<p>Replaces: ${p.replaces}</p>

<a class="small-btn green">View Deal</a>

<a class="small-btn">Details</a>

</div>

</div>

`).join("");

</script>

</body>

</html>
