<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ChopShops — curated finds</title>
  <link rel="icon" href="assets/logo.png" />
  <style>
    :root{
      --bg:#0b0c0f;--panel:#12141a;--muted:#8b93a1;--text:#e8ecf1;
      --brand:#79ffe1;--brand2:#14b8a6;--chip:#1b1f29;--card:#10131a;
      --stroke:#262a36;--hover:#171a22;--danger:#ef4444;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;background:linear-gradient(180deg,#0b0c0f 0%,#0e1117 100%);
      color:var(--text);font:400 16px/1.5 system-ui, -apple-system, Segoe UI, Roboto, Inter, "Helvetica Neue", Arial;
    }
    a{color:inherit;text-decoration:none}
    .container{max-width:1200px;margin:0 auto;padding:24px}
    /* Header */
    .nav{
      position:sticky;top:0;z-index:50;
      background:rgba(11,12,15,.6);backdrop-filter:saturate(120%) blur(10px);
      border-bottom:1px solid var(--stroke);
    }
    .nav-inner{display:flex;align-items:center;gap:16px;padding:12px 24px}
    .logo{display:flex;align-items:center;gap:12px;cursor:pointer}
    .logo img{height:28px;width:auto;border-radius:6px}
    .logo-title{font-weight:700;letter-spacing:.2px}
    .badge{font-size:12px;color:#0b0c0f;background:var(--brand);padding:2px 8px;border-radius:999px}
    /* Toolbar */
    .toolbar{display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin:20px 0}
    .tabs{display:flex;gap:8px}
    .tab{
      padding:8px 12px;border:1px solid var(--stroke);border-radius:10px;background:var(--chip);
      color:var(--muted);cursor:pointer;transition:.15s;
    }
    .tab.active{background:linear-gradient(90deg,var(--brand2),var(--brand));color:#00130f;font-weight:700;border-color:transparent}
    .chips{display:flex;gap:8px;overflow:auto;padding-bottom:4px}
    .chip{
      padding:6px 10px;border:1px solid var(--stroke);border-radius:999px;background:var(--chip);
      color:var(--muted);white-space:nowrap;cursor:pointer;transition:.15s;
    }
    .chip.active{background:#0f766e;color:#d1faf5;border-color:#0d9488}
    .search{margin-left:auto;display:flex;align-items:center;gap:8px;background:var(--chip);border:1px solid var(--stroke);border-radius:12px;padding:8px 12px}
    .search input{background:transparent;border:0;outline:0;color:var(--text);width:220px}
    /* Grid */
    .grid{display:grid;gap:16px;grid-template-columns:repeat(12,1fr)}
    @media (max-width:1100px){ .grid{grid-template-columns:repeat(8,1fr)} }
    @media (max-width:720px){ .grid{grid-template-columns:repeat(4,1fr)} .search input{width:140px}}
    .col-3{grid-column:span 3}
    /* Card */
    .card{border:1px solid var(--stroke);background:var(--card);border-radius:14px;overflow:hidden;display:flex;flex-direction:column;transition:.18s}
    .card:hover{transform:translateY(-2px);background:var(--hover)}
    .thumb{aspect-ratio:16/12;background:#0d1117;display:grid;place-items:center;color:#303645}
    .thumb img{width:100%;height:100%;object-fit:cover}
    .content{padding:14px}
    .title{font-weight:650;margin:0 0 6px 0}
    .meta{color:var(--muted);font-size:13px;display:flex;gap:10px;align-items:center}
    .price{color:#e0fffb;background:#0b3b36;padding:2px 8px;border-radius:999px;border:1px solid #14524d}
    .why{margin-top:10px;color:#bac2cf;font-size:14px}
    .row{display:flex;align-items:center;justify-content:space-between;margin-top:12px}
    .btn{
      background:linear-gradient(90deg,var(--brand2),var(--brand));color:#00130f;font-weight:700;
      border:0;padding:8px 12px;border-radius:10px;cursor:pointer
    }
    .skeleton{animation:pulse 1.2s ease-in-out infinite;background:#11161d;border-radius:12px;border:1px solid var(--stroke)}
    .sk-img{height:150px}
    .sk-ln{height:12px;margin:10px}
    @keyframes pulse{0%{opacity:.6}50%{opacity:1}100%{opacity:.6}}
    .empty{color:var(--muted);text-align:center;padding:40px;border:1px dashed var(--stroke);border-radius:14px;background:var(--panel)}
    footer{opacity:.6;margin:52px 0 24px}
  </style>
</head>
<body>
  <!-- HEADER -->
  <div class="nav">
    <div class="nav-inner container">
      <div class="logo" onclick="location.href='/'">
        <img src="assets/logo.png" alt="ChopShops logo"/>
        <div class="logo-title">ChopShops</div>
        <span class="badge">curated finds</span>
      </div>
      <div class="search" id="searchBox">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M21 21l-4.35-4.35m1.35-5.65a7 7 0 11-14 0 7 7 0 0114 0z" stroke="#8b93a1" stroke-width="2" stroke-linecap="round"/></svg>
        <input id="q" placeholder="Search products…" />
      </div>
    </div>
  </div>

  <main class="container">
    <!-- TABS + CATEGORY CHIPS -->
    <div class="toolbar">
      <div class="tabs" id="tabs">
        <button class="tab active" data-scope="latest">Latest</button>
        <button class="tab" data-scope="approved">Approved</button>
        <button class="tab" data-scope="ideas">Ideas</button>
      </div>
      <div class="chips" id="chips"></div>
    </div>

    <!-- GRID -->
    <section id="grid" class="grid"></section>

    <div id="empty" class="empty" style="display:none">
      No items match your filters.
    </div>

    <footer class="container">© <span id="y"></span> ChopShops — curated finds</footer>
  </main>

  <script>
    // --- helpers -------------------------------------------------------------
    const $ = (s, r=document)=>r.querySelector(s);
    const $$ = (s, r=document)=>Array.from(r.querySelectorAll(s));
    const money = n => (n==null||n==="") ? "" : `$${Number(n).toFixed(2)}`;

    // --- state ---------------------------------------------------------------
    let SCOPE = 'latest';           // latest | approved | ideas
    let ACTIVE_CATEGORY = 'All';    // chip selection
    let QUERY = '';

    // --- UI: tabs & chips ----------------------------------------------------
    $$('#tabs .tab').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        $$('#tabs .tab').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        SCOPE = btn.dataset.scope;
        render();
      });
    });

    $('#q').addEventListener('input', e=>{ QUERY = e.target.value.trim().toLowerCase(); render(); });

    // --- data ----------------------------------------------------------------
    let ITEMS = [];  // filled after fetch
    const GRID = $('#grid');
    const EMPTY = $('#empty');
    $('#y').textContent = new Date().getFullYear();

    function skeleton(n=8){
      GRID.innerHTML = '';
      for(let i=0;i<n;i++){
        const d = document.createElement('div');
        d.className = 'col-3 card skeleton';
        d.innerHTML = `<div class="sk-img"></div><div class="sk-ln"></div><div class="sk-ln" style="width:60%"></div>`;
        GRID.appendChild(d);
      }
    }

    async function load(){
      skeleton(12);
      try{
        const res = await fetch('/functions/fetchProducts', { headers: { 'cache-control': 'no-cache' }});
        const json = await res.json();
        ITEMS = (json.items || []).map(x=>({
          title: x.title || 'Untitled',
          url: x.url || '#',
          image: x.image || '',
          price: x.price ?? null,
          category: x.category || 'Other',
          status: (x.status || '').toLowerCase(),
          why: x.why || '',
          hook: x.hook || '',
          liked: !!x.liked
        }));
        buildChips();
        render();
      }catch(e){
        GRID.innerHTML = `<div class="empty">Error loading products.</div>`;
        console.error(e);
      }
    }

    function buildChips(){
      const cats = Array.from(new Set(ITEMS.map(i=>i.category))).sort();
      const chips = ['All', ...cats];
      const wrap = $('#chips');
      wrap.innerHTML = '';
      chips.forEach(c=>{
        const b = document.createElement('button');
        b.className = 'chip' + (c===ACTIVE_CATEGORY?' active':'');
        b.textContent = c;
        b.addEventListener('click', ()=>{
          ACTIVE_CATEGORY = c;
          $$('#chips .chip').forEach(x=>x.classList.remove('active'));
          b.classList.add('active');
          render();
        });
        wrap.appendChild(b);
      });
    }

    function filterItems(){
      let a = ITEMS.slice();
      if (SCOPE === 'approved') a = a.filter(i => i.status === 'approved' || i.liked);
      if (SCOPE === 'ideas') a = a.filter(i => i.status.startsWith('idea'));
      if (ACTIVE_CATEGORY !== 'All') a = a.filter(i => i.category === ACTIVE_CATEGORY);
      if (QUERY) a = a.filter(i =>
        (i.title?.toLowerCase().includes(QUERY)) ||
        (i.why?.toLowerCase().includes(QUERY)) ||
        (i.category?.toLowerCase().includes(QUERY))
      );
      return a;
    }

    function card(i){
      const img = i.image
        ? `<img src="${i.image}" alt="${i.title}"/>`
        : `<div class="thumb"><span>No Image</span></div>`;
      return `
      <article class="card col-3">
        <div class="thumb">${img}</div>
        <div class="content">
          <h3 class="title">${i.title}</h3>
          <div class="meta">
            <span>${i.category}</span>
            ${i.price!=null ? `<span class="price">${money(i.price)}</span>` : ''}
            ${i.hook ? `<span>• ${i.hook}</span>` : ''}
          </div>
          ${i.why ? `<div class="why">${i.why}</div>` : ''}
          <div class="row">
            <a class="btn" href="${i.url}" target="_blank" rel="noopener">Buy →</a>
            <span style="color:${i.status==='approved'?'#34d399':i.status.startsWith('idea')?'#fde68a':'#8b93a1'};font-size:12px">${i.status||'—'}</span>
          </div>
        </div>
      </article>`;
    }

    function render(){
      const list = filterItems();
      if (!list.length){ GRID.innerHTML=''; EMPTY.style.display='block'; return; }
      EMPTY.style.display='none';
      GRID.innerHTML = list.map(card).join('');
    }

    load();
  </script>
</body>
</html>
