<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chop Shops | Save More. Buy Smarter.</title>

<style>

:root{

  --green:#5dae32;

  --green-dark:#3f8421;

  --black:#050505;

  --bg:#f7f7f4;

  --border:#dedede;

}

*{margin:0;padding:0;box-sizing:border-box;}

body{

  font-family:Arial, Helvetica, sans-serif;

  background:var(--bg);

  color:#111;

}

/* HEADER */

.header{

  height:74px;

  background:#000;

  color:#fff;

  display:flex;

  align-items:center;

  justify-content:space-between;

  padding:0 24px;

}

.logo img{

  height:46px;

}

/* NAV */

.nav{

  display:flex;

  gap:24px;

  font-weight:700;

}

.header-actions{

  display:flex;

  align-items:center;

  gap:10px;

}

.search{

  background:#111;

  border:1px solid #333;

  padding:10px;

  border-radius:6px;

  color:white;

}

/* HERO */

.hero{

  background:

    linear-gradient(90deg, rgba(0,0,0,.9), rgba(0,0,0,.4)),

    url("https://images.unsplash.com/photo-1556911220-bff31c812dba");

  background-size:cover;

  padding:80px 8%;

  color:white;

}

.hero h1{

  font-size:56px;

  margin-bottom:20px;

}

.hero span{color:var(--green);}

.btn{

  padding:14px 22px;

  border-radius:6px;

  font-weight:800;

  display:inline-block;

}

.green{background:var(--green);color:white;}

.outline{border:2px solid white;color:white;}

/* DEALS */

.section{padding:40px 6%;}

.grid{

  display:grid;

  grid-template-columns:repeat(5,1fr);

  gap:16px;

}

.card{

  background:white;

  border-radius:8px;

  overflow:hidden;

  border:1px solid var(--border);

}

.card img{

  width:100%;

  height:180px;

  object-fit:cover;

}

.card-body{padding:12px;}

.price{

  font-weight:900;

  font-size:20px;

}

.annual{

  margin-top:6px;

  font-size:13px;

}

.annual strong{

  display:block;

  color:var(--green);

}

.replaces{

  font-size:13px;

  margin-top:6px;

}

.small-btn{

  display:block;

  margin-top:6px;

  padding:8px;

  text-align:center;

  border-radius:5px;

  font-weight:800;

  border:1px solid #ccc;

}

.small-btn.green{

  background:var(--green);

  color:white;

}

/* MOBILE */

@media(max-width:900px){

  .nav{display:none;}

  .grid{grid-template-columns:repeat(2,1fr);}

}

@media(max-width:600px){

  .logo img{height:36px;}

  .hero{

    padding:60px 20px;

  }

  .hero h1{

    font-size:36px;

  }

  .grid{

    grid-template-columns:1fr;

  }

  .card{

    display:flex;

  }

  .card img{

    width:120px;

    height:120px;

  }

  .card-body{

    padding:10px;

  }

}

</style>

</head>

<body>

<!-- HEADER -->

<header class="header">

  <div class="logo">

    <img src="assets/logo.PNG" alt="Chop Shops Logo">

  </div>

  <nav class="nav">

    <a>Deals</a>

    <a>Categories</a>

    <a>How It Works</a>

  </nav>

  <div class="header-actions">

    <input class="search" placeholder="Search deals...">

  </div>

</header>

<!-- HERO -->

<section class="hero">

  <h1>STOP OVERPAYING FOR <span>EVERYDAY STUFF</span></h1>

  <p>Products that replace recurring expenses and save money every year.</p>

  <a class="btn green">SHOP DEALS</a>

  <a class="btn outline">HOW IT SAVES YOU</a>

</section>

<!-- DEALS -->

<section class="section">

  <h2>FEATURED DEALS</h2>

  <br>

  <div class="grid" id="grid"></div>

</section>

<script>

const products = [

{

name:"Water Filter Pitcher",

price:"$29.99",

savings:"$180–$600/year",

replaces:"Bottled water & delivery water",

img:"https://images.unsplash.com/photo-1622484212850-eb596d769edc"

},

{

name:"Reusable Paper Towels",

price:"$19.99",

savings:"$100–$250/year",

replaces:"Paper towels & napkins",

img:"https://images.unsplash.com/photo-1600857544200-b2f666a9a2ec"

},

{

name:"Safety Razor Kit",

price:"$24.99",

savings:"$80–$200/year",

replaces:"Disposable razors",

img:"https://images.unsplash.com/photo-1621607512214-68297480165e"

},

{

name:"Reusable Coffee Filter",

price:"$13.99",

savings:"$60–$150/year",

replaces:"Paper filters & pods",

img:"https://images.unsplash.com/photo-1495474472287-4d71bcdd2085"

},

{

name:"Steam Mop Cleaner",

price:"$79.99",

savings:"$100–$300/year",

replaces:"Cleaning pads & chemicals",

img:"https://images.unsplash.com/photo-1581578731548-c64695cc6952"

}

];

const grid = document.getElementById("grid");

grid.innerHTML = products.map(p => `

<div class="card">

<img src="${p.img}">

<div class="card-body">

<h3>${p.name}</h3>

<div class="price">${p.price}</div>

<div class="annual">

<strong>Annual Savings:</strong>

${p.savings}

</div>

<div class="replaces">

<strong>Replaces:</strong>

${p.replaces}

</div>

<a class="small-btn green">View Deal</a>

<a class="small-btn">Details</a>

</div>

</div>

`).join("");

</script>

</body>

</html>
