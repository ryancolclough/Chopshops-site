<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ChopShops</title>
  <meta name="color-scheme" content="dark light" />
  <style>
    :root{
      --bg:#0e0f12;
      --panel:#14161b;
      --card:#171a20;
      --muted:#9aa3b2;
      --text:#e7ebf3;
      --accent:#7dd3fc;
      --ring:#2a2f3a;
    }
    html,body{height:100%}
    body{
      margin:0; background:var(--bg); color:var(--text);
      font:16px/1.45 system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
    }
    a{color:var(--accent); text-decoration:none}
    a:hover{text-decoration:underline}

    /* Header */
    .header{
      position:sticky; top:0; z-index:50;
      background:linear-gradient(to bottom, rgba(14,15,18,.95), rgba(14,15,18,.78) 70%, rgba(14,15,18,0));
      backdrop-filter:saturate(1.2) blur(6px);
      border-bottom:1px solid var(--ring);
    }
    .wrap{max-width:1200px; margin:0 auto; padding:14px 18px}
    .row{display:flex; align-items:center; gap:12px}

    .logo{
      display:flex; align-items:center; gap:10px; flex-shrink:0;
    }
    .logo img{
      width:36px; height:36px; object-fit:contain; display:block;
    }
    .brand{font-weight:700; letter-spacing:.3px}

    .spacer{flex:1}

    .toolbar{display:flex; align-items:center; gap:8px; flex-wrap:wrap}
    .seg{
      display:inline-flex; background:var(--panel); border:1px solid var(--ring);
      border-radius:10px; overflow:hidden;
    }
    .seg button{
      padding:8px 12px; background:transparent; color:var(--text);
      border:0; cursor:pointer; font-weight:600;
    }
    .seg button[aria-pressed="true"]{background:var(--card)}

    .menu{
      display:flex; gap:8px; flex-wrap:wrap;
      background:var(--panel); border:1px solid var(--ring);
      border-radius:10px; padding:6px;
      max-width:100%; overflow:auto;
    }
    .chip{
      border:1px solid var(--ring); background:transparent; color:var(--text);
      padding:6px 10px; border-radius:999px;cursor:pointer;white-space:nowrap;
    }
    .chip[aria-pressed="true"]{background:var(--card);}

    /* Grid */
    main{max-width:1200px; margin:0 auto; padding:18px}
    h2{margin:16px 2px 10px; font-size:18px; color:var(--muted)}

    .grid{
      display:grid; gap:14px;
      grid-template-columns:repeat(1,minmax(0,1fr));
    }
    @media(min-width:640px){ .grid{grid-template-columns:repeat(2,1fr)} }
    @media(min-width:900px){ .grid{grid-template-columns:repeat(3,1fr)} }
    @media(min-width:1200px){ .grid{grid-template-columns:repeat(4,1fr)} }

    .card{
      background:var(--card); border:1px solid var(--ring); border-radius:14px;
      overflow:hidden; display:flex; flex-direction:column; min-height:230px;
    }
    .thumb{
      aspect-ratio:16/10; background:#0b0d11; display:flex; align-items:center;
      justify-content:center; color:#465063; font-weight:700;
    }
    .thumb img{width:100%; height:100%; object-fit:cover; display:block}
    .body{padding:10px 12px 12px}
    .title{font-weight:700; margin:0 0 6px; font-size:15px}
    .meta{font-size:12px; color:var(--muted); display:flex; gap:10px; align-items:center}
    .actions{margin-top:10px; display:flex; gap:10px; flex-wrap:wrap}
    .btn{
      display:inline-flex; align-items:center; gap:6px;
      padding:7px 10px; border-radius:8px; border:1px solid var(--ring);
      background:var(--panel); color:var(--text); cursor:pointer;
    }
    .btn.primary{background:#0b6; border-color:#0a5; color:white}
    .empty{
      padding:30px; text-align:center; color:var(--muted); border:1px dashed var(--ring);
      border-radius:12px; background:var(--panel);
    }

    /* Skeletons */
    .skel{animation:sh 1.2s infinite linear; background:linear-gradient(90deg,#1a1e26 25%,#202533 37%,#1a1e26 63%); background-size:400% 100%}
    @keyframes sh { 0%{background-position:100% 50%} 100%{background-position:0 50%} }
    .sk-card .thumb{background:#12151b}
    .sk-line{height:12px; border-radius:6px; margin-top:10px}
  </style>
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="wrap">
      <div class="row">
        <!-- Logo (click to go "home"/Latest) -->
        <a class="logo" href="#" id="homeLink" title="ChopShops">
          <img src="assets/logo.png" alt="ChopShops logo" />
          <span class="brand">ChopShops</span>
        </a>

        <div class="spacer"></div>

        <!-- Status filter -->
        <div class="toolbar">
          <div class="seg" role="tablist" aria-label="Status">
            <button role="tab" id="tab-latest"   data-status="latest"   aria-pressed="true">Latest</button>
            <button role="tab" id="tab-approved" data-status="approved" aria-pressed="false">Approved</button>
            <button role="tab" id="tab-ideas"    data-status="ideas"    aria-pressed="false">Ideas</button>
          </div>
        </div>
      </div>

      <!-- Category chips (built dynamically) -->
      <div class="row" style="margin-top:10px">
        <nav class="menu" id="categoryMenu" aria-label="Categories">
          <!-- chips injected here -->
        </nav>
      </div>
    </div>
  </header>

  <!-- Content -->
  <main>
    <h2 id="sectionTitle">Latest finds</h2>
    <section class="grid" id="grid">
      <!-- skeletons -->
    </section>
    <div id="empty" class="empty" style="display:none">No items match the current filters.</div>
  </main>

  <script>
    // ---------- STATE ----------
    let ALL = [];
    let currentStatus = 'latest';   // latest | approved | ideas
    let currentCategory = 'All';    // 'All' or any category name

    const grid = document.getElementById('grid');
    const empty = document.getElementById('empty');
    const sectionTitle = document.getElementById('sectionTitle');
    const catMenu = document.getElementById('categoryMenu');

    // ---------- HELPERS ----------
    function setStatus(next){
      currentStatus = next;
      for (const btn of document.querySelectorAll('.seg button')){
        btn.setAttribute('aria-pressed', String(btn.dataset.status === next));
      }
      updateTitle();
      render();
    }

    function setCategory(next){
      currentCategory = next;
      for (const chip of document.querySelectorAll('.chip')){
        chip.setAttribute('aria-pressed', String(chip.dataset.cat === next));
      }
      updateTitle();
      render();
    }

    function updateTitle(){
      const nice = currentStatus === 'latest' ? 'Latest'
                 : currentStatus === 'approved' ? 'Approved'
                 : 'Ideas';
      sectionTitle.textContent = currentCategory === 'All'
        ? `${nice} finds`
        : `${nice} • ${currentCategory}`;
    }

    function showSkeletons(n=8){
      empty.style.display='none';
      grid.innerHTML='';
      for(let i=0;i<n;i++){
        const el = document.createElement('article');
        el.className='card sk-card';
        el.innerHTML = `
          <div class="thumb skel"></div>
          <div class="body">
            <div class="sk-line skel" style="width:70%"></div>
            <div class="sk-line skel" style="width:40%"></div>
          </div>`;
        grid.appendChild(el);
      }
    }

    function buildCategories(items){
      const set = new Set(items.map(i => i.category).filter(Boolean));
      const cats = ['All', ...Array.from(set).sort((a,b)=>a.localeCompare(b))];
      catMenu.innerHTML = '';
      for (const c of cats){
        const btn = document.createElement('button');
        btn.className = 'chip';
        btn.dataset.cat = c;
        btn.setAttribute('aria-pressed', String(c === currentCategory));
        btn.textContent = c;
        btn.addEventListener('click', () => setCategory(c));
        catMenu.appendChild(btn);
      }
    }

    function filterItems(){
      let list = [...ALL];

      // status filter
      if (currentStatus === 'approved'){
        list = list.filter(x => (x.status || '').toLowerCase() === 'approved' || x.liked);
      } else if (currentStatus === 'ideas'){
        list = list.filter(x => (x.status || '').toLowerCase() === 'idea' || (x.status || '').toLowerCase() === 'ideas');
      } else {
        // latest: keep as-is; we’ll sort newest first if there’s a date later
      }

      // category filter
      if (currentCategory !== 'All'){
        list = list.filter(x => (x.category || '') === currentCategory);
      }

      return list;
    }

    function render(){
      const list = filterItems();
      grid.innerHTML = '';

      if (!list.length){
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';

      for (const item of list){
        const img = item.image ? `<img src="${item.image}" alt="">`
                               : `<div style="color:#3b4557;font-weight:700">No Image</div>`;
        const buy = item.url ? `<a class="btn primary" href="${item.url}" target="_blank" rel="noopener">Buy →</a>`
                             : '';
        const why = item.why ? `<span title="${item.why}">• ${item.why}</span>` : '';
        const cat = item.category ? `<span>${item.category}</span>` : '';
        const price = (item.price ?? '') !== '' && item.price !== null ? `<span>$${Number(item.price).toFixed(2)}</span>` : '';

        const card = document.createElement('article');
        card.className = 'card';
        card.innerHTML = `
          <div class="thumb">${img}</div>
          <div class="body">
            <h3 class="title">${escapeHtml(item.title || 'Untitled')}</h3>
            <div class="meta">${[cat, price, why].filter(Boolean).join(' ')}</div>
            <div class="actions">
              ${buy}
              ${item.hook ? `<span class="btn" title="${escapeHtml(item.hook)}">Hook</span>` : ''}
            </div>
          </div>
        `;
        grid.appendChild(card);
      }
    }

    function escapeHtml(s){
      return String(s)
        .replaceAll('&','&amp;')
        .replaceAll('<','&lt;')
        .replaceAll('>','&gt;')
        .replaceAll('"','&quot;')
        .replaceAll("'","&#39;");
    }

    // ---------- DATA LOAD ----------
    async function load(){
      showSkeletons();
      try{
        const res = await fetch('/fetchProducts', { cache: 'no-store' });
        const json = await res.json();   // { items:[...] }
        ALL = Array.isArray(json.items) ? json.items : [];
        buildCategories(ALL);
        render();
      }catch(err){
        console.error(err);
        grid.innerHTML = '';
        empty.style.display='block';
        empty.textContent = 'Failed to load products.';
      }
    }

    // ---------- EVENTS ----------
    document.getElementById('homeLink').addEventListener('click', (e)=>{
      e.preventDefault();
      setStatus('latest');
      setCategory('All');
    });
    document.getElementById('tab-latest').addEventListener('click', ()=>setStatus('latest'));
    document.getElementById('tab-approved').addEventListener('click', ()=>setStatus('approved'));
    document.getElementById('tab-ideas').addEventListener('click', ()=>setStatus('ideas'));

    // Init
    updateTitle();
    load();
  </script>
</body>
</html>
